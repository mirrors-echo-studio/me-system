<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror's Echo — 課堂管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--accent:#b388ff;--accent2:#7c4dff;--gold:#ffd54f;--text:#f0eeff;--muted:#8a85a0;--success:#69f0ae;--danger:#ff6b6b;--warning:#ffd54f;--radius:14px;--radius-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh;font-size:15px;line-height:1.6;}
.screen{display:none;min-height:100vh;}.screen.active{display:block;}
#screen-landing{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:radial-gradient(ellipse at 60% 20%,rgba(124,77,255,0.18) 0%,transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(179,136,255,0.10) 0%,transparent 50%),var(--bg);}
#screen-landing.active{display:flex;}
.logo-mark{width:72px;height:72px;border-radius:50%;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:1.5rem;box-shadow:0 0 40px rgba(179,136,255,0.2);}
.logo-title{font-family:'DM Serif Display',serif;font-size:clamp(26px,6vw,38px);font-weight:400;letter-spacing:0.02em;text-align:center;margin-bottom:0.4rem;background:linear-gradient(135deg,#f0eeff 0%,#b388ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{color:var(--muted);font-size:13px;letter-spacing:0.12em;text-align:center;margin-bottom:3rem;}
.landing-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:var(--radius);padding:14px 24px;font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;transition:opacity 0.2s,transform 0.15s;letter-spacing:0.04em;}
.btn-primary:hover{opacity:0.88;transform:translateY(-1px);}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 24px;font-size:15px;font-family:inherit;font-weight:400;cursor:pointer;transition:background 0.2s;letter-spacing:0.04em;}
.btn-secondary:hover{background:var(--surface2);}
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:56px;}
.header-logo{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent);}
.header-right{display:flex;align-items:center;gap:8px;}
.tag-role{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(179,136,255,0.15);color:var(--accent);letter-spacing:0.06em;font-weight:500;}
.btn-logout{background:none;border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;transition:color 0.2s,border-color 0.2s;}
.btn-logout:hover{color:var(--text);border-color:var(--accent);}
.btn-lang{background:none;border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.btn-lang:hover{color:var(--accent);border-color:var(--accent);}
.main-wrap{max-width:860px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}
.nav-tabs{display:flex;gap:4px;background:var(--surface);border-radius:var(--radius);padding:4px;margin-bottom:1.5rem;overflow-x:auto;}
.nav-tab{flex:1;min-width:60px;padding:8px 8px;background:none;border:none;color:var(--muted);font-family:inherit;font-size:12px;font-weight:400;border-radius:10px;cursor:pointer;transition:all 0.18s;white-space:nowrap;text-align:center;}
.nav-tab.active{background:var(--surface2);color:var(--text);font-weight:500;}
.section{display:none;}.section.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:13px;color:var(--muted);letter-spacing:0.08em;font-weight:500;margin-bottom:1rem;text-transform:uppercase;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:0.08em;margin-bottom:6px;}
.stat-value{font-size:26px;font-weight:500;color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.single{grid-template-columns:1fr;}.form-row.triple{grid-template-columns:1fr 1fr 1fr;}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;letter-spacing:0.04em;}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--surface2);}
.form-actions{display:flex;gap:10px;margin-top:1rem;flex-wrap:wrap;}
.btn-sm{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-family:inherit;cursor:pointer;border:none;font-weight:500;transition:opacity 0.2s;}
.btn-accent{background:var(--accent2);color:#fff;}.btn-accent:hover{opacity:0.85;}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}.btn-ghost:hover{color:var(--text);}
.btn-danger-sm{background:rgba(255,107,107,0.15);color:var(--danger);border:1px solid rgba(255,107,107,0.25);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500;font-size:11px;letter-spacing:0.06em;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}tr:hover td{background:rgba(255,255,255,0.02);}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.badge-purple{background:rgba(179,136,255,0.15);color:var(--accent);}
.badge-gold{background:rgba(255,213,79,0.15);color:var(--gold);}
.badge-green{background:rgba(105,240,174,0.15);color:var(--success);}
.badge-red{background:rgba(255,107,107,0.15);color:var(--danger);}
.badge-gray{background:rgba(138,133,160,0.15);color:var(--muted);}
.progress-wrap{background:var(--surface2);border-radius:99px;height:6px;margin-top:6px;overflow:hidden;}
.progress-bar{height:100%;border-radius:99px;transition:width 0.5s ease;}
.progress-bar.green{background:var(--success);}.progress-bar.yellow{background:var(--warning);}.progress-bar.red{background:var(--danger);}
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.att-card{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;transition:all 0.15s;user-select:none;}
.att-card:hover{border-color:var(--border2);}
.att-card.present{border-color:var(--success);background:rgba(105,240,174,0.06);}
.att-card.absent{border-color:var(--danger);background:rgba(255,107,107,0.05);opacity:0.6;}
.att-name{font-size:14px;font-weight:500;margin-bottom:2px;}.att-sub{font-size:11px;color:var(--muted);}
.student-hero{background:linear-gradient(135deg,rgba(124,77,255,0.2),rgba(179,136,255,0.08));border:1px solid rgba(179,136,255,0.25);border-radius:var(--radius);padding:2rem;text-align:center;margin-bottom:1.5rem;}
.student-hero-name{font-size:22px;font-weight:500;margin-bottom:0.25rem;}
.student-hero-sub{color:var(--muted);font-size:13px;}
#screen-student{display:none;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:2rem 1.25rem;background:radial-gradient(ellipse at 70% 10%,rgba(124,77,255,0.12) 0%,transparent 55%),var(--bg);}
#screen-student.active{display:flex;}
.query-input-wrap{display:flex;gap:8px;}
.query-input-wrap input{flex:1;font-size:18px;letter-spacing:0.15em;text-align:center;}
.student-result{margin-top:2rem;width:100%;max-width:600px;}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px;}
.history-item:last-child{border-bottom:none;}
.history-date{color:var(--muted);min-width:85px;font-size:12px;}
.history-dance{flex:1;font-size:13px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:1.75rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:500;margin-bottom:1.25rem;}
#screen-login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:var(--bg);}
#screen-login.active{display:flex;}
.login-box{width:100%;max-width:340px;}
.login-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:0.5rem;color:var(--accent);}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:2rem;}
.empty{text-align:center;color:var(--muted);padding:3rem 1rem;font-size:14px;}
.flash{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:10px 20px;font-size:13px;z-index:9999;animation:slideUp 0.25s ease;pointer-events:none;white-space:nowrap;}
@keyframes slideUp{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}
.alert-banner{background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.3);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:1rem;font-size:13px;color:var(--danger);}
.alert-banner.warning{background:rgba(255,213,79,0.1);border-color:rgba(255,213,79,0.3);color:var(--warning);}
.studio-info{background:rgba(179,136,255,0.06);border:1px solid rgba(179,136,255,0.15);border-radius:var(--radius-sm);padding:14px 16px;margin-top:1rem;font-size:13px;}
.studio-info a{color:var(--accent);text-decoration:none;}
.section-title{font-size:18px;font-weight:500;margin-bottom:1.25rem;}
.divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
.shared-note{font-size:12px;color:var(--muted);margin-top:4px;}
.inline-actions{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-size:11px;padding:2px 8px;background:var(--surface2);border-radius:20px;color:var(--muted);border:1px solid var(--border);}
.month-stat{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.month-stat-item{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;text-align:center;}
.month-stat-num{font-size:22px;font-weight:500;}.month-stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
.cache-note{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;}
.edit-badge{cursor:pointer;font-size:10px;opacity:0.7;margin-left:4px;}
.edit-badge:hover{opacity:1;}
@media(max-width:520px){.form-row{grid-template-columns:1fr;}.form-row.triple{grid-template-columns:1fr 1fr;}.stat-row{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div id="screen-landing" class="screen">
  <div class="logo-mark">🪞</div>
  <div class="logo-title">Mirror's Echo</div>
  <div class="logo-sub">PERFORMANCE STUDIO</div>
  <div class="landing-btns">
    <button class="btn-primary" onclick="goTo('screen-login')">老師登入</button>
    <button class="btn-secondary" onclick="goTo('screen-student')">學生查詢課卡</button>
  </div>
  <div style="margin-top:1.5rem"><button class="btn-lang" onclick="toggleLang()">EN / 中</button></div>
</div>

<div id="screen-login" class="screen">
  <div class="login-box">
    <div class="login-title">老師登入</div>
    <div class="login-sub">請輸入管理員密碼</div>
    <div style="margin-bottom:12px"><label>密碼</label><input type="password" id="login-pw" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <button class="btn-primary" style="width:100%" onclick="doLogin()">登入</button>
    <div style="margin-top:1rem;text-align:center"><button class="btn-logout" onclick="goTo('screen-landing')">← 返回</button></div>
    <div id="login-err" style="color:var(--danger);font-size:13px;margin-top:10px;text-align:center;display:none">密碼錯誤</div>
  </div>
</div>

<div id="screen-teacher" class="screen">
  <div class="app-header">
    <div class="header-logo">M·E</div>
    <div class="header-right">
      <button class="btn-lang" onclick="toggleLang()">EN/中</button>
      <span class="tag-role">老師</span>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
  </div>
  <div class="main-wrap">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('tab-overview',this)">總覽</button>
      <button class="nav-tab" onclick="switchTab('tab-attendance',this)">點名</button>
      <button class="nav-tab" onclick="switchTab('tab-students',this)">學生</button>
      <button class="nav-tab" onclick="switchTab('tab-venue',this)">場地</button>
      <button class="nav-tab" onclick="switchTab('tab-history',this)">紀錄</button>
      <button class="nav-tab" onclick="switchTab('tab-settings',this)">設定</button>
    </div>

    <div id="tab-overview" class="section active">
      <div class="stat-row" id="overview-stats"></div>
      <div class="card">
        <div class="card-title">學生課卡狀態</div>
        <div class="table-wrap"><table id="overview-table">
          <thead><tr><th>學生</th><th>課程包</th><th>剩餘堂數</th><th>有效期</th><th>狀態</th></tr></thead>
          <tbody></tbody>
        </table></div>
      </div>
    </div>

    <div id="tab-attendance" class="section">
      <div class="card">
        <div class="card-title">今日點名</div>
        <div class="form-row triple">
          <div><label>日期</label><input type="date" id="att-date" /></div>
          <div><label>老師</label><select id="att-teacher"></select></div>
          <div><label>課程類型</label>
            <select id="att-type" onchange="updateSongField()">
              <option value="常態課">常態課</option>
              <option value="作品專攻">作品專攻</option>
              <option value="MV副歌班">MV副歌班</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div><label>課程名稱</label><input type="text" id="att-dance" placeholder="自由輸入，例：THAT'S A NO NO" /></div>
          <div><label>上課時間</label><input type="text" id="att-time" placeholder="例：19:00-20:00" /></div>
        </div>
        <div id="att-song-wrap" style="display:none;margin-bottom:12px">
          <label>曲目名稱</label>
          <input type="text" id="att-song" placeholder="例：SEVENTEEN - Super" />
        </div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:1rem">點擊學生卡片切換出席／缺席狀態</div>
        <div class="att-grid" id="att-grid"></div>
        <div class="form-actions" style="margin-top:1.5rem">
          <button class="btn-sm btn-accent" onclick="saveAttendance()">儲存出席紀錄</button>
        </div>
      </div>
    </div>

    <div id="tab-students" class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div class="section-title" style="margin:0">學生管理</div>
        <button class="btn-sm btn-accent" onclick="openStudentModal()">+ 新增學生</button>
      </div>
      <div id="student-list"></div>
    </div>

    <div id="tab-venue" class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div class="section-title" style="margin:0">場地租借記錄</div>
        <button class="btn-sm btn-accent" onclick="openVenueModal()">+ 新增租借</button>
      </div>
      <div class="card">
        <div class="table-wrap"><table>
          <thead><tr><th>日期</th><th>租借人</th><th>時段</th><th>時數</th><th>金額</th><th>備註</th><th></th></tr></thead>
          <tbody id="venue-tbody"></tbody>
        </table></div>
      </div>
    </div>

    <div id="tab-history" class="section">
      <div class="card">
        <div class="card-title">上課紀錄 <span style="font-size:11px;color:var(--muted);font-weight:300">（點出席/缺席標籤可編輯）</span></div>
        <div class="form-row">
          <div><label>篩選學生</label><select id="hist-filter-student"><option value="">全部學生</option></select></div>
          <div><label>篩選月份</label><input type="month" id="hist-filter-month" /></div>
        </div>
        <div id="history-list"></div>
      </div>
    </div>

    <div id="tab-settings" class="section">
      <div class="card">
        <div class="card-title">老師名單</div>
        <div id="teacher-tag-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem"></div>
        <div style="display:flex;gap:8px">
          <input type="text" id="new-teacher-input" placeholder="新增老師名稱" style="flex:1" />
          <button class="btn-sm btn-accent" onclick="addTeacher()">新增</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">更改管理密碼</div>
        <div class="form-row">
          <div><label>新密碼</label><input type="password" id="new-pw" placeholder="••••••" /></div>
          <div><label>確認新密碼</label><input type="password" id="new-pw2" placeholder="••••••" /></div>
        </div>
        <button class="btn-sm btn-accent" onclick="changePw()">更新密碼</button>
      </div>
      <div class="card">
        <div class="card-title" style="color:var(--danger)">危險區域</div>
        <button class="btn-sm btn-danger-sm" onclick="if(confirm('確定要清除所有資料？此操作無法復原。'))clearAll()">清除所有資料</button>
      </div>
    </div>
  </div>
</div>

<div id="screen-student" class="screen">
  <div style="width:100%;max-width:600px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn-logout" onclick="goTo('screen-landing')">← 返回</button>
        <div style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent)">學生課卡查詢</div>
      </div>
      <button class="btn-lang" onclick="toggleLang()">EN/中</button>
    </div>
    <div style="width:100%">
      <label style="font-size:14px;margin-bottom:8px;display:block">輸入你的查詢碼</label>
      <div class="query-input-wrap">
        <input type="text" id="query-code" placeholder="例：ME001" maxlength="10" style="text-transform:uppercase" onkeydown="if(event.key==='Enter')queryStudent()" />
        <button class="btn-sm btn-accent" onclick="queryStudent()">查詢</button>
      </div>
      <div id="query-err" style="color:var(--danger);font-size:13px;margin-top:8px;display:none">找不到此查詢碼</div>
      <div class="cache-note" id="cache-note" style="display:none"></div>
    </div>
    <div id="student-result" class="student-result"></div>
  </div>
</div>

<!-- MODAL: STUDENT -->
<div class="modal-overlay" id="modal-student">
  <div class="modal">
    <div class="modal-title" id="modal-student-title">新增學生</div>
    <div class="form-row">
      <div><label>姓名 *</label><input type="text" id="s-name" /></div>
      <div><label>查詢碼 *</label><input type="text" id="s-code" placeholder="例：ME001" style="text-transform:uppercase" /></div>
    </div>
    <div class="form-row">
      <div><label>聯絡方式</label><input type="text" id="s-contact" placeholder="LINE / 手機" /></div>
      <div><label>備註</label><input type="text" id="s-note" /></div>
    </div>
    <hr class="divider" />
    <div style="font-size:13px;color:var(--muted);margin-bottom:1rem;font-weight:500">課程包設定</div>
    <div class="form-row">
      <div>
        <label>課程包類型</label>
        <select id="s-pack-type" onchange="updatePackUI()">
          <option value="">— 尚無課程包 —</option>
          <option value="單堂">單堂（500元/堂）</option>

<script>
let lang='zh';
const TR={zh:{present:'出席',absent:'缺席',noRecords:'尚無出席紀錄',myCard:'我的課卡',remaining:'剩餘堂數',renewReminder:'課卡即將用完，請聯繫老師續卡',thisMonth:'本月統計',monthAttended:'出席',monthAbsent:'缺席',noPack:'無課卡',exhausted:'堂數用盡',expired:'已過期',expiringSoon:'即將到期',normal:'正常'},
en:{present:'Present',absent:'Absent',noRecords:'No records yet',myCard:'My Card',remaining:'Remaining',renewReminder:'Card running low — contact your teacher to renew',thisMonth:'This Month',monthAttended:'Attended',monthAbsent:'Absent',noPack:'No Card',exhausted:'Used Up',expired:'Expired',expiringSoon:'Expiring',normal:'Active'}};
function T(k){return TR[lang][k]||TR.zh[k]||k;}
function toggleLang(){lang=lang==='zh'?'en':'zh';flash(lang==='en'?'Switched to English':'已切換為中文');}

const API='https://script.google.com/macros/s/AKfycbwLU_VG5Pfo5lpaj03ZEUSV9DYQIJA7EhYdw2s9Rst3MvfSKIUaIWbuGbApzMcweT4/exec';
const CACHE_KEY='me_cache_v2';const CACHE_TTL=5*60*1000;
let mem={};

function saveLocalCache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify({data:mem,ts:Date.now()}));}catch(e){}}
function loadLocalCache(){try{const raw=localStorage.getItem(CACHE_KEY);if(!raw)return false;const p=JSON.parse(raw);if(Date.now()-p.ts>CACHE_TTL)return false;mem=p.data;return true;}catch(e){return false;}}

async function apiGet(key,def){
  try{const r=await fetch(`${API}?action=get${cap(key)}`);const j=await r.json();return j.data?JSON.parse(j.data):def;}
  catch{return def;}
}
async function apiSet(key,val){
  mem[key]=val;saveLocalCache();
  try{await fetch(API,{method:'POST',body:JSON.stringify({action:`set${cap(key)}`,value:val})});}
  catch{console.warn('save failed');}
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function getStudents(){return mem['students']??[];}
function setStudents(s){mem['students']=s;apiSet('students',s);}
function getRecords(){return mem['records']??[];}
function setRecords(r){mem['records']=r;apiSet('records',r);}
function getTeachers(){return mem['teachers']??['雅淳老師','婉甄老師','華華老師','Joan老師'];}
function setTeachers(t){mem['teachers']=t;apiSet('teachers',t);}
function getVenues(){return mem['venues']??[];}
function setVenues(v){mem['venues']=v;apiSet('venues',v);}
function getPw(){return mem['pw']??'me2024';}

async function loadAllData(){
  showLoading(true);
  try{
    mem['students']=await apiGet('students',[]);
    mem['records']=await apiGet('records',[]);
    mem['teachers']=await apiGet('teachers',['雅淳老師','婉甄老師','華華老師','Joan老師']);
    mem['venues']=await apiGet('venues',[]);
    const cfg=await apiGet('config',{pw:'me2024'});
    mem['pw']=cfg?cfg.pw:'me2024';
    saveLocalCache();
  }finally{showLoading(false);}
}

function showLoading(on){
  let el=document.getElementById('lo');
  if(!el){el=document.createElement('div');el.id='lo';el.style.cssText='position:fixed;inset:0;background:rgba(10,10,15,0.88);z-index:9998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;';el.innerHTML='<div style="width:32px;height:32px;border:2px solid rgba(179,136,255,0.3);border-top-color:#b388ff;border-radius:50%;animation:spin 0.8s linear infinite"></div><div style="color:#8a85a0;font-size:13px">載入中...</div>';const st=document.createElement('style');st.textContent='@keyframes spin{to{transform:rotate(360deg)}}';document.head.appendChild(st);document.body.appendChild(el);}
  el.style.display=on?'flex':'none';
}

function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-teacher')renderAll();
  if(id==='screen-student'){document.getElementById('query-code').value='';document.getElementById('student-result').innerHTML='';document.getElementById('query-err').style.display='none';document.getElementById('cache-note').style.display='none';}
}
function logout(){goTo('screen-landing');}
function switchTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
  if(id==='tab-attendance')renderAttendance();
  if(id==='tab-students')renderStudents();
  if(id==='tab-history')renderHistory();
  if(id==='tab-overview')renderOverview();
  if(id==='tab-settings')renderSettings();
  if(id==='tab-venue')renderVenue();
}

async function doLogin(){
  const pw=document.getElementById('login-pw').value;
  await loadAllData();
  if(pw===getPw()){document.getElementById('login-err').style.display='none';document.getElementById('login-pw').value='';goTo('screen-teacher');}
  else{document.getElementById('login-err').style.display='block';}
}

function renderOverview(){
  const students=getStudents(),records=getRecords(),today=new Date();
  const active=students.filter(s=>s.pack&&s.remaining>0).length;
  const expiring=students.filter(s=>{if(!s.expire)return false;const d=new Date(s.expire);return(d-today)/86400000<=14&&(d-today)>=0;}).length;
  const thisMonth=today.toISOString().slice(0,7);
  document.getElementById('overview-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">學生人數</div><div class="stat-value">${students.length}</div></div>
    <div class="stat-card"><div class="stat-label">有效課卡</div><div class="stat-value" style="color:var(--success)">${active}</div></div>
    <div class="stat-card"><div class="stat-label">即將到期（14天）</div><div class="stat-value" style="color:var(--warning)">${expiring}</div></div>
    <div class="stat-card"><div class="stat-label">本月出席</div><div class="stat-value">${records.filter(r=>r.date&&r.date.startsWith(thisMonth)&&r.status==='present').length}</div></div>`;
  const tbody=document.querySelector('#overview-table tbody');
  if(!students.length){tbody.innerHTML='<tr><td colspan="5" class="empty">尚無學生資料</td></tr>';return;}
  tbody.innerHTML=students.map(s=>{
    const pct=s.total?Math.round((s.remaining/s.total)*100):0;
    const barClass=pct>40?'green':pct>15?'yellow':'red';
    let status='';
    if(!s.pack)status=`<span class="badge badge-gray">${T('noPack')}</span>`;
    else if(s.remaining<=0)status=`<span class="badge badge-red">${T('exhausted')}</span>`;
    else if(s.expire&&new Date(s.expire)<today)status=`<span class="badge badge-red">${T('expired')}</span>`;
    else if(s.expire&&(new Date(s.expire)-today)/86400000<=14)status=`<span class="badge badge-gold">${T('expiringSoon')}</span>`;
    else status=`<span class="badge badge-green">${T('normal')}</span>`;
    return `<tr><td><strong>${s.name}</strong><br><span style="font-size:11px;color:var(--muted)">${s.code}</span></td>
      <td>${s.pack||'—'}</td>
      <td><span style="font-size:15px;font-weight:500">${s.remaining??'—'}</span>${s.total?`<span style="color:var(--muted);font-size:12px"> / ${s.total}</span>`:''}
      ${s.total?`<div class="progress-wrap"><div class="progress-bar ${barClass}" style="width:${pct}%"></div></div>`:''}</td>
      <td style="font-size:13px;color:var(--muted)">${s.expire||'—'}</td><td>${status}</td></tr>`;
  }).join('');
}

let attState={};
function updateSongField(){const t=document.getElementById('att-type').value;document.getElementById('att-song-wrap').style.display=(t==='作品專攻'||t==='MV副歌班')?'block':'none';}
function renderAttendance(){
  const students=getStudents();
  if(!document.getElementById('att-date').value)document.getElementById('att-date').value=new Date().toISOString().slice(0,10);
  attState={};students.forEach(s=>{attState[s.id]='none';});
  const sel=document.getElementById('att-teacher');
  sel.innerHTML=getTeachers().map(t=>`<option value="${t}">${t}</option>`).join('');
  if(!students.length){document.getElementById('att-grid').innerHTML='<div class="empty">尚無學生</div>';return;}
  renderAttGrid(students);
}
function renderAttGrid(students){
  document.getElementById('att-grid').innerHTML=students.map(s=>{
    const st=attState[s.id];
    const cardClass=st==='present'?'present':st==='absent'?'absent':'';
    const label=st==='present'?'✓ 出席':st==='absent'?'✗ 缺席':'—';
    return `<div class="att-card ${cardClass}" onclick="toggleAtt('${s.id}')">
      <div class="att-name">${s.name}</div>
      <div class="att-sub">${s.remaining!==undefined?'剩 '+s.remaining+' 堂':'無課卡'}</div>
      <div style="margin-top:6px;font-size:12px;color:${st==='present'?'var(--success)':st==='absent'?'var(--danger)':'var(--muted)'}">${label}</div>
    </div>`;
  }).join('');
}
function toggleAtt(id){const cur=attState[id];attState[id]=cur==='none'?'present':cur==='present'?'absent':'none';renderAttGrid(getStudents());}
function saveAttendance(){
  const date=document.getElementById('att-date').value;
  const dance=document.getElementById('att-dance').value.trim();
  if(!date){flash('請選擇日期');return;}
  if(!dance){flash('請輸入課程名稱');return;}
  const teacher=document.getElementById('att-teacher').value;
  const type=document.getElementById('att-type').value;
  const time=document.getElementById('att-time').value.trim();
  const song=document.getElementById('att-song').value.trim();
  const students=getStudents(),records=getRecords();let count=0;
  students.forEach(s=>{
    const st=attState[s.id];if(st==='none')return;
    let primaryId=s.id;
    const host=students.find(h=>h.sharedMembers&&h.sharedMembers.includes(s.code));
    if(host)primaryId=host.id;
    records.push({id:Date.now().toString()+Math.random().toString(36).slice(2),studentId:s.id,primaryCardId:primaryId,date,dance,type,teacher,time,song,status:st});
    count++;
    if(st==='present'){const idx=students.findIndex(x=>x.id===primaryId);if(idx!==-1&&students[idx].remaining>0)students[idx].remaining=Math.max(0,(students[idx].remaining||0)-1);}
  });
  setStudents(students);setRecords(records);
  flash(`已儲存 ${count} 筆紀錄`);renderOverview();renderAttGrid(students);
}

let editingStudentId=null;
function renderStudents(){
  const students=getStudents(),container=document.getElementById('student-list');
  if(!students.length){container.innerHTML='<div class="empty">尚無學生資料</div>';return;}
  container.innerHTML=students.map(s=>{
    const pct=s.total?Math.round((s.remaining/s.total)*100):0;
    const barClass=pct>40?'green':pct>15?'yellow':'red';
    const today=new Date();
    const isExpiring=s.expire&&(new Date(s.expire)-today)/86400000<=7&&(new Date(s.expire)-today)>=0;
    const isLow=s.remaining<=2&&s.remaining>0;
    const alerts=(isExpiring?'<div class="alert-banner warning" style="margin-top:8px;padding:8px 12px">⚠ 課卡7天內到期</div>':'')+(isLow?`<div class="alert-banner" style="margin-top:8px;padding:8px 12px">⚠ 僅剩 ${s.remaining} 堂，請提醒學生續卡</div>`:'');
    const shareInfo=s.shareMax>1?`<span class="chip">共用 ${s.shareMax} 人</span>`:'';
    const members=s.sharedMembers&&s.sharedMembers.length?`<span class="chip">成員：${(s.sharedNames&&s.sharedNames.length?s.sharedNames:s.sharedMembers).join(', ')}</span>`:'';
    return `<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:16px;font-weight:500">${s.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">查詢碼：<strong style="color:var(--accent)">${s.code}</strong>${s.contact?' ｜ 聯絡：'+s.contact:''}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${shareInfo}${members}</div>
        </div>
        <div class="inline-actions">
          <button class="btn-sm btn-ghost" style="padding:6px 12px" onclick="openPackModal('${s.id}')">換課程包</button>
          <button class="btn-sm btn-ghost" style="padding:6px 12px" onclick="openStudentModal('${s.id}')">編輯</button>
        </div>
      </div>
      <hr class="divider" />
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
        <div><div style="font-size:11px;color:var(--muted)">課程包</div><div style="font-size:14px">${s.pack||'尚無課程包'}</div></div>
        <div style="flex:1;min-width:120px">
          <div style="font-size:11px;color:var(--muted)">剩餘堂數</div>
          <div style="font-size:18px;font-weight:500;color:${s.remaining<=2?'var(--danger)':'var(--text)'}">${s.remaining??'—'} <span style="font-size:12px;color:var(--muted)">/ ${s.total??'—'}</span></div>
          ${s.total?`<div class="progress-wrap"><div class="progress-bar ${barClass}" style="width:${Math.max(pct,0)}%"></div></div>`:''}
        </div>
        <div><div style="font-size:11px;color:var(--muted)">有效期</div><div style="font-size:13px">${s.expire||'—'}</div></div>
      </div>
      ${alerts}${s.note?`<div style="margin-top:8px;font-size:12px;color:var(--muted)">備註：${s.note}</div>`:''}
    </div>`;
  }).join('');
}
function openStudentModal(id){
  editingStudentId=id||null;
  document.getElementById('modal-student-title').textContent=id?'編輯學生':'新增學生';
  document.getElementById('btn-delete-student').style.display=id?'inline-flex':'none';
  if(id){
    const s=getStudents().find(x=>x.id===id);
    document.getElementById('s-name').value=s.name||'';document.getElementById('s-code').value=s.code||'';
    document.getElementById('s-contact').value=s.contact||'';document.getElementById('s-note').value=s.note||'';
    document.getElementById('s-pack-type').value=s.pack||'';document.getElementById('s-total').value=s.total||'';
    document.getElementById('s-expire').value=s.expire||'';document.getElementById('s-share').value=s.shareMax||'1';
    document.getElementById('s-shared-members').value=(s.sharedMembers||[]).join(',');
    document.getElementById('s-shared-names').value=(s.sharedNames||[]).join(',');
  } else {
    ['s-name','s-code','s-contact','s-note','s-total','s-expire','s-shared-members','s-shared-names'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('s-pack-type').value='';document.getElementById('s-share').value='1';
  }
  updatePackUI();openModal('modal-student');
}
function updatePackUI(){
  const pack=document.getElementById('s-pack-type').value;
  const shareVal=document.getElementById('s-share').value;
  document.getElementById('pack-extra-row').style.display=pack?'grid':'none';
  document.getElementById('shared-members-wrap').style.display=(pack&&shareVal>1)?'block':'none';
  const totals={'單堂':1,'四堂':4,'十堂':10,'二十堂':20,'作品五堂':5};
  if(totals[pack]&&!document.getElementById('s-total').value)document.getElementById('s-total').value=totals[pack];
  const shareDef={'十堂':'2','二十堂':'3'};if(shareDef[pack])document.getElementById('s-share').value=shareDef[pack];
}
function saveStudent(){
  const name=document.getElementById('s-name').value.trim();
  const code=document.getElementById('s-code').value.trim().toUpperCase();
  if(!name||!code){flash('姓名和查詢碼為必填');return;}
  const students=getStudents();
  if(students.find(s=>s.code===code&&s.id!==editingStudentId)){flash('此查詢碼已被使用');return;}
  const pack=document.getElementById('s-pack-type').value;
  const total=parseInt(document.getElementById('s-total').value)||0;
  const shareMax=parseInt(document.getElementById('s-share').value)||1;
  const sharedMembers=document.getElementById('s-shared-members').value.split(',').map(x=>x.trim().toUpperCase()).filter(Boolean);
  const sharedNames=document.getElementById('s-shared-names').value.split(',').map(x=>x.trim()).filter(Boolean);
  const entry={name,code,contact:document.getElementById('s-contact').value.trim(),note:document.getElementById('s-note').value.trim(),pack,total,expire:document.getElementById('s-expire').value,shareMax,sharedMembers,sharedNames};
  if(editingStudentId){
    const idx=students.findIndex(s=>s.id===editingStudentId);const old=students[idx];
    students[idx]={...old,...entry,remaining:pack!==old.pack?total:old.remaining,id:old.id};
  } else {students.push({...entry,id:Date.now().toString(),remaining:total});}
  setStudents(students);closeModal('modal-student');renderStudents();renderOverview();flash(editingStudentId?'學生資料已更新':'學生已新增');
}
function deleteStudent(){
  if(!confirm('確定要刪除此學生？'))return;
  setStudents(getStudents().filter(s=>s.id!==editingStudentId));
  closeModal('modal-student');renderStudents();renderOverview();flash('學生已刪除');
}

function openPackModal(id){
  document.getElementById('pack-target-id').value=id;
  const s=getStudents().find(x=>x.id===id);
  document.getElementById('p-type').value=s.pack||'四堂';document.getElementById('p-total').value=s.total||'';
  document.getElementById('p-expire').value='';document.getElementById('p-share').value=s.shareMax||'1';
  document.getElementById('p-shared-members').value='';updatePackShareUI();openModal('modal-pack');
}
function updatePackShareUI(){document.getElementById('p-shared-wrap').style.display=document.getElementById('p-share').value>1?'block':'none';}
function savePack(){
  const id=document.getElementById('pack-target-id').value;
  const pack=document.getElementById('p-type').value;
  const total=parseInt(document.getElementById('p-total').value)||0;
  if(!total){flash('請輸入堂數');return;}
  const shareMax=parseInt(document.getElementById('p-share').value)||1;
  const sharedMembers=document.getElementById('p-shared-members').value.split(',').map(x=>x.trim().toUpperCase()).filter(Boolean);
  const students=getStudents();
  const idx=students.findIndex(s=>s.id===id);
  if(idx!==-1)students[idx]={...students[idx],pack,total,remaining:total,expire:document.getElementById('p-expire').value,shareMax,sharedMembers};
  setStudents(students);closeModal('modal-pack');renderStudents();renderOverview();flash('課程包已更新');
}

function renderHistory(){
  const students=getStudents(),records=getRecords();
  const sel=document.getElementById('hist-filter-student');
  const cur=sel.value;
  sel.innerHTML='<option value="">全部學生</option>'+students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  sel.value=cur;
  const filterStudent=sel.value;
  const filterMonth=document.getElementById('hist-filter-month').value;
  let filtered=[...records];
  if(filterStudent)filtered=filtered.filter(r=>r.studentId===filterStudent);
  if(filterMonth)filtered=filtered.filter(r=>r.date&&r.date.startsWith(filterMonth));
  filtered.sort((a,b)=>b.date.localeCompare(a.date));
  const container=document.getElementById('history-list');
  if(!filtered.length){container.innerHTML='<div class="empty">無符合紀錄</div>';return;}
  const byDate={};
  filtered.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
  container.innerHTML=Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,rows])=>`
    <div style="margin-bottom:1.5rem">
      <div style="font-size:12px;color:var(--accent);letter-spacing:0.06em;margin-bottom:6px">${date}</div>
      ${rows.map(r=>{
        const s=students.find(x=>x.id===r.studentId);
        return `<div class="history-item">
          <div class="history-date">${s?s.name:'—'}</div>
          <div class="history-dance">${r.dance||'—'}${r.song?' · '+r.song:''}<span style="font-size:11px;color:var(--muted)">${r.teacher?' ('+r.teacher+')':''}</span></div>
          <span class="badge ${r.status==='present'?'badge-green':'badge-red'}" style="cursor:pointer" title="點擊編輯" onclick="openRecordModal('${r.id}')">${r.status==='present'?'出席':'缺席'} ✎</span>
        </div>`;
      }).join('')}
    </div>`).join('');
}
document.getElementById('hist-filter-student').addEventListener('change',renderHistory);
document.getElementById('hist-filter-month').addEventListener('change',renderHistory);

function openRecordModal(id){
  const r=getRecords().find(x=>x.id===id);if(!r)return;
  document.getElementById('rec-edit-id').value=id;
  document.getElementById('rec-date').value=r.date||'';
  document.getElementById('rec-status').value=r.status||'present';
  document.getElementById('rec-dance').value=r.dance||'';
  document.getElementById('rec-teacher').value=r.teacher||'';
  document.getElementById('rec-time').value=r.time||'';
  document.getElementById('rec-song').value=r.song||'';
  openModal('modal-record');
}
function saveRecord(){
  const id=document.getElementById('rec-edit-id').value;
  const records=getRecords();const idx=records.findIndex(r=>r.id===id);if(idx===-1)return;
  const oldStatus=records[idx].status;const newStatus=document.getElementById('rec-status').value;
  records[idx]={...records[idx],date:document.getElementById('rec-date').value,status:newStatus,dance:document.getElementById('rec-dance').value.trim(),teacher:document.getElementById('rec-teacher').value.trim(),time:document.getElementById('rec-time').value.trim(),song:document.getElementById('rec-song').value.trim()};
  if(oldStatus!==newStatus){
    const students=getStudents();const primaryId=records[idx].primaryCardId||records[idx].studentId;
    const sidx=students.findIndex(s=>s.id===primaryId);
    if(sidx!==-1){
      if(oldStatus==='present'&&newStatus==='absent')students[sidx].remaining=Math.min((students[sidx].remaining||0)+1,students[sidx].total||999);
      if(oldStatus==='absent'&&newStatus==='present')students[sidx].remaining=Math.max((students[sidx].remaining||0)-1,0);
      setStudents(students);
    }
  }
  setRecords(records);closeModal('modal-record');renderHistory();renderOverview();flash('紀錄已更新');
}
function deleteRecord(){
  if(!confirm('確定要刪除這筆紀錄？'))return;
  const id=document.getElementById('rec-edit-id').value;
  const records=getRecords();const r=records.find(x=>x.id===id);
  if(r&&r.status==='present'){
    const students=getStudents();const primaryId=r.primaryCardId||r.studentId;
    const sidx=students.findIndex(s=>s.id===primaryId);
    if(sidx!==-1){students[sidx].remaining=Math.min((students[sidx].remaining||0)+1,students[sidx].total||999);setStudents(students);}
  }
  setRecords(records.filter(x=>x.id!==id));closeModal('modal-record');renderHistory();renderOverview();flash('紀錄已刪除');
}

let editingVenueId=null;
function renderVenue(){
  const venues=getVenues(),tbody=document.getElementById('venue-tbody');
  if(!venues.length){tbody.innerHTML='<tr><td colspan="7" class="empty">尚無租借紀錄</td></tr>';return;}
  tbody.innerHTML=[...venues].sort((a,b)=>b.date.localeCompare(a.date)).map(v=>`<tr>
    <td>${v.date}</td><td>${v.renter}</td><td style="font-size:12px">${v.time||'—'}</td>
    <td>${v.hours||'—'} hr</td><td>${v.amount?'NT$ '+v.amount:'—'}</td>
    <td style="font-size:12px;color:var(--muted)">${v.note||''}</td>
    <td><button class="btn-sm btn-ghost" style="padding:4px 10px;font-size:12px" onclick="openVenueModal('${v.id}')">編輯</button></td>
  </tr>`).join('');
}
function openVenueModal(id){
  editingVenueId=id||null;
  document.getElementById('btn-delete-venue').style.display=id?'inline-flex':'none';
  if(id){const v=getVenues().find(x=>x.id===id);document.getElementById('v-date').value=v.date||'';document.getElementById('v-renter').value=v.renter||'';document.getElementById('v-time').value=v.time||'';document.getElementById('v-hours').value=v.hours||'';document.getElementById('v-amount').value=v.amount||'';document.getElementById('v-contact').value=v.contact||'';document.getElementById('v-note').value=v.note||'';}
  else{['v-date','v-renter','v-time','v-hours','v-amount','v-contact','v-note'].forEach(i=>document.getElementById(i).value='');document.getElementById('v-date').value=new Date().toISOString().slice(0,10);}
  openModal('modal-venue');
}
function saveVenue(){
  const date=document.getElementById('v-date').value,renter=document.getElementById('v-renter').value.trim();
  if(!date||!renter){flash('日期和租借人為必填');return;}
  const venues=getVenues();
  const entry={id:editingVenueId||Date.now().toString(),date,renter,time:document.getElementById('v-time').value,hours:document.getElementById('v-hours').value,amount:document.getElementById('v-amount').value,contact:document.getElementById('v-contact').value,note:document.getElementById('v-note').value};
  if(editingVenueId){const idx=venues.findIndex(v=>v.id===editingVenueId);if(idx!==-1)venues[idx]=entry;}else venues.push(entry);
  setVenues(venues);closeModal('modal-venue');renderVenue();flash('租借紀錄已儲存');
}
function deleteVenue(){
  if(!confirm('確定要刪除？'))return;
  setVenues(getVenues().filter(v=>v.id!==editingVenueId));
  closeModal('modal-venue');renderVenue();flash('已刪除');
}

function renderSettings(){
  document.getElementById('teacher-tag-list').innerHTML=getTeachers().map((t,i)=>
    `<span class="chip" style="cursor:pointer" onclick="removeTeacher(${i})">${t} ✕</span>`).join('');
}
function addTeacher(){
  const val=document.getElementById('new-teacher-input').value.trim();if(!val)return;
  const teachers=getTeachers();if(!teachers.includes(val)){teachers.push(val);setTeachers(teachers);}

function removeTeacher(i){const t=getTeachers();t.splice(i,1);setTeachers(t);renderSettings();}
function changePw(){
  const p1=document.getElementById('new-pw').value,p2=document.getElementById('new-pw2').value;

  mem['pw']=p1;apiSet('config',{pw:p1});document.getElementById('new-pw').value='';document.getElementById('new-pw2').value='';flash('密碼已更新');

async function clearAll(){
  mem={students:[],records:[],venues:[],teachers:['雅淳老師','婉甄老師','華華老師','Joan老師'],pw:'me2024'};
  saveLocalCache();await apiSet('students',[]);await apiSet('records',[]);await apiSet('venues',[]);
  flash('所有資料已清除');renderAll();

async function queryStudent(){
  const code=document.getElementById('query-code').value.trim().toUpperCase();
  const err=document.getElementById('query-err');
  const result=document.getElementById('student-result');
  const cacheNote=document.getElementById('cache-note');
  if(!code)return;
  const hadCache=loadLocalCache();
  if(!hadCache){showLoading(true);await loadAllData();showLoading(false);}
  const students=getStudents();
  let s=students.find(x=>x.code===code);
  let hostStudent=null;
  if(!s)hostStudent=students.find(h=>h.sharedMembers&&h.sharedMembers.includes(code));
  if(!s&&!hostStudent){err.style.display='block';result.innerHTML='';cacheNote.style.display='none';return;}
  err.style.display='none';
  const cardHolder=hostStudent||s;
  const displayName=s?s.name:code;
  const myRecords=getRecords().filter(r=>r.studentId===(s?s.id:hostStudent.id));
  myRecords.sort((a,b)=>b.date.localeCompare(a.date));
  const today=new Date();const thisMonth=today.toISOString().slice(0,7);
  const monthPresent=myRecords.filter(r=>r.date&&r.date.startsWith(thisMonth)&&r.status==='present').length;
  const monthAbsent=myRecords.filter(r=>r.date&&r.date.startsWith(thisMonth)&&r.status==='absent').length;
  const pct=cardHolder.total?Math.round((cardHolder.remaining/cardHolder.total)*100):0;
  const barClass=pct>40?'green':pct>15?'yellow':'red';
  const daysLeft=cardHolder.expire?Math.ceil((new Date(cardHolder.expire)-today)/86400000):null;
  const isExpiring=daysLeft!==null&&daysLeft<=7&&daysLeft>=0;
  const isLow=cardHolder.remaining!==undefined&&cardHolder.remaining<=2&&cardHolder.remaining>0;
  const sharedNote=hostStudent?`<div style="font-size:12px;color:var(--muted);margin-top:4px">與 ${hostStudent.name} 共用課卡</div>`:(cardHolder.shareMax>1?`<div style="font-size:12px;color:var(--muted);margin-top:4px">此課卡可共用 ${cardHolder.shareMax} 人</div>`:'');
  const renewAlert=(isExpiring||isLow)?`<div class="alert-banner" style="margin-bottom:1rem">⚠ ${T('renewReminder')}<br><a href="https://lin.ee/707emoda" style="color:var(--danger)">LINE: @707emoda</a></div>`:'';
  const recentRows=myRecords.slice(0,20).map(r=>`
    <div class="history-item">
      <div class="history-date">${r.date}</div>
      <div class="history-dance">${r.dance||'—'}${r.song?' · '+r.song:''}</div>
      <span class="badge ${r.status==='present'?'badge-green':'badge-red'}">${r.status==='present'?T('present'):T('absent')}</span>
    </div>`).join('')||`<div class="empty" style="padding:1.5rem 0">${T('noRecords')}</div>`;
  result.innerHTML=`
    <div class="student-hero">
      <div class="student-hero-name">${displayName}</div>
      <div class="student-hero-sub">${code}${sharedNote}</div>
    </div>
    ${renewAlert}
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">${T('myCard')}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
        <div>
          <div style="font-size:15px;font-weight:500">${cardHolder.pack||'尚無課程包'}</div>
          ${cardHolder.expire?`<div style="font-size:13px;color:${isExpiring?'var(--warning)':'var(--muted)'}">有效期：${cardHolder.expire}${daysLeft!==null?' （剩 '+daysLeft+' 天）':''}</div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:30px;font-weight:500;color:${isLow?'var(--danger)':'var(--accent)'}">${cardHolder.remaining??'—'}</div>
          <div style="font-size:12px;color:var(--muted)">${T('remaining')} / ${cardHolder.total??'—'}</div>
        </div>
      </div>
      ${cardHolder.total?`<div class="progress-wrap" style="margin-top:12px"><div class="progress-bar ${barClass}" style="width:${Math.max(pct,0)}%"></div></div>`:''}
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">${T('thisMonth')}</div>
      <div class="month-stat">
        <div class="month-stat-item"><div class="month-stat-num" style="color:var(--success)">${monthPresent}</div><div class="month-stat-label">${T('monthAttended')}</div></div>
        <div class="month-stat-item"><div class="month-stat-num" style="color:var(--danger)">${monthAbsent}</div><div class="month-stat-label">${T('monthAbsent')}</div></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">出缺席紀錄</div>${recentRows}
    </div>
    <div class="studio-info">
      <div style="font-weight:500;margin-bottom:6px">Mirror's Echo Performance Studio</div>
      <div>📍 台北市中山區長安東路二段42-7號3樓</div>
      <div>💬 LINE: <a href="https://lin.ee/707emoda">@707emoda</a></div>
      <div>📸 IG: <a href="https://www.instagram.com/m.e_performance_studio/">@m.e_performance_studio</a></div>
    </div>`;
  if(hadCache){cacheNote.style.display='block';cacheNote.textContent='顯示快取資料，如需最新資訊請重新整理頁面再查詢';}
  else{cacheNote.style.display='none';}
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});});
function flash(msg){const el=document.createElement('div');el.className='flash';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}
function renderAll(){renderOverview();}
goTo('screen-landing');
</script>
