<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror's Echo — 課堂管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--accent:#b388ff;--accent2:#7c4dff;--gold:#ffd54f;--text:#f0eeff;--muted:#8a85a0;--success:#69f0ae;--danger:#ff6b6b;--warning:#ffd54f;--radius:14px;--radius-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh;font-size:15px;line-height:1.6;}
.screen{display:none;min-height:100vh;}.screen.active{display:block;}
#screen-landing{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:radial-gradient(ellipse at 60% 20%,rgba(124,77,255,0.18) 0%,transparent 60%),radial-gradient(ellipse at 20% 80%,rgba(179,136,255,0.10) 0%,transparent 50%),var(--bg);}
#screen-landing.active{display:flex;}
.logo-mark{width:72px;height:72px;border-radius:50%;border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:1.5rem;box-shadow:0 0 40px rgba(179,136,255,0.2);}
.logo-title{font-family:'DM Serif Display',serif;font-size:clamp(26px,6vw,38px);font-weight:400;letter-spacing:0.02em;text-align:center;margin-bottom:0.4rem;background:linear-gradient(135deg,#f0eeff 0%,#b388ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{color:var(--muted);font-size:13px;letter-spacing:0.12em;text-align:center;margin-bottom:3rem;}
.landing-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;border:none;border-radius:var(--radius);padding:14px 24px;font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;transition:opacity 0.2s,transform 0.15s;letter-spacing:0.04em;}
.btn-primary:hover{opacity:0.88;transform:translateY(-1px);}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius);padding:14px 24px;font-size:15px;font-family:inherit;font-weight:400;cursor:pointer;transition:background 0.2s;}
.btn-secondary:hover{background:var(--surface2);}
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:56px;}
.header-logo{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent);}
.header-right{display:flex;align-items:center;gap:8px;}
.tag-role{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(179,136,255,0.15);color:var(--accent);letter-spacing:0.06em;font-weight:500;}
.btn-logout{background:none;border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;transition:color 0.2s;}
.btn-logout:hover{color:var(--text);}
.btn-lang{background:none;border:1px solid var(--border2);color:var(--muted);border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;}
.main-wrap{max-width:900px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}
.nav-tabs{display:flex;gap:4px;background:var(--surface);border-radius:var(--radius);padding:4px;margin-bottom:1.5rem;overflow-x:auto;}
.nav-tab{flex:1;min-width:54px;padding:8px 6px;background:none;border:none;color:var(--muted);font-family:inherit;font-size:11px;font-weight:400;border-radius:10px;cursor:pointer;transition:all 0.18s;white-space:nowrap;text-align:center;}
.nav-tab.active{background:var(--surface2);color:var(--text);font-weight:500;}
.section{display:none;}.section.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:13px;color:var(--muted);letter-spacing:0.08em;font-weight:500;margin-bottom:1rem;text-transform:uppercase;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:6px;}
.stat-value{font-size:24px;font-weight:500;color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.single{grid-template-columns:1fr;}.form-row.triple{grid-template-columns:1fr 1fr 1fr;}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--surface2);}
.form-actions{display:flex;gap:10px;margin-top:1rem;flex-wrap:wrap;}
.btn-sm{padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-family:inherit;cursor:pointer;border:none;font-weight:500;transition:opacity 0.2s;}
.btn-accent{background:var(--accent2);color:#fff;}.btn-accent:hover{opacity:0.85;}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}.btn-ghost:hover{color:var(--text);}
.btn-success{background:rgba(105,240,174,0.15);color:var(--success);border:1px solid rgba(105,240,174,0.3);}
.btn-danger-sm{background:rgba(255,107,107,0.15);color:var(--danger);border:1px solid rgba(255,107,107,0.25);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500;font-size:11px;white-space:nowrap;}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}tr:hover td{background:rgba(255,255,255,0.02);}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.badge-green{background:rgba(105,240,174,0.15);color:var(--success);}
.badge-gold{background:rgba(255,213,79,0.15);color:var(--gold);}
.badge-red{background:rgba(255,107,107,0.15);color:var(--danger);}
.badge-gray{background:rgba(138,133,160,0.15);color:var(--muted);}
.badge-purple{background:rgba(179,136,255,0.15);color:var(--accent);}
.badge-blue{background:rgba(100,181,246,0.15);color:#64b5f6;}
.progress-wrap{background:var(--surface2);border-radius:99px;height:6px;margin-top:6px;overflow:hidden;}
.progress-bar{height:100%;border-radius:99px;}
.progress-bar.green{background:var(--success);}.progress-bar.yellow{background:var(--warning);}.progress-bar.red{background:var(--danger);}
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.att-card{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;transition:all 0.15s;user-select:none;}
.att-card.present{border-color:var(--success);background:rgba(105,240,174,0.06);}
.att-card.absent{border-color:var(--danger);background:rgba(255,107,107,0.05);opacity:0.6;}
.att-name{font-size:14px;font-weight:500;margin-bottom:2px;}.att-sub{font-size:11px;color:var(--muted);}
.student-hero{background:linear-gradient(135deg,rgba(124,77,255,0.2),rgba(179,136,255,0.08));border:1px solid rgba(179,136,255,0.25);border-radius:var(--radius);padding:1.75rem;text-align:center;margin-bottom:1.25rem;}
.student-hero-name{font-size:22px;font-weight:500;margin-bottom:0.25rem;}
.student-hero-sub{color:var(--muted);font-size:13px;}
#screen-student{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:2rem 1.25rem;background:radial-gradient(ellipse at 70% 10%,rgba(124,77,255,0.12) 0%,transparent 55%),var(--bg);}
#screen-student.active{display:flex;}
.query-input-wrap{display:flex;gap:8px;}
.query-input-wrap input{flex:1;font-size:18px;letter-spacing:0.15em;text-align:center;}
.student-result{margin-top:2rem;width:100%;max-width:600px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:1.75rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:500;margin-bottom:1.25rem;}
#screen-login{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:var(--bg);}
#screen-login.active{display:flex;}
.login-box{width:100%;max-width:340px;}
.login-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:0.5rem;color:var(--accent);}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:2rem;}
.empty{text-align:center;color:var(--muted);padding:2.5rem 1rem;font-size:14px;}
.flash{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:10px 20px;font-size:13px;z-index:9999;animation:slideUp 0.25s ease;pointer-events:none;white-space:nowrap;}
@keyframes slideUp{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}
.alert-banner{background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.3);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:1rem;font-size:13px;color:var(--danger);}
.alert-banner.warning{background:rgba(255,213,79,0.1);border-color:rgba(255,213,79,0.3);color:var(--warning);}
.studio-info{background:rgba(179,136,255,0.06);border:1px solid rgba(179,136,255,0.15);border-radius:var(--radius-sm);padding:14px 16px;margin-top:1rem;font-size:13px;}
.studio-info a{color:var(--accent);text-decoration:none;}
.divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
.shared-note{font-size:12px;color:var(--muted);margin-top:4px;}
.chip{font-size:11px;padding:2px 8px;background:var(--surface2);border-radius:20px;color:var(--muted);border:1px solid var(--border);}
.cache-note{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;}
/* Pack blocks */
.pack-block{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;}
.pack-block-header{font-size:13px;font-weight:500;margin-bottom:3px;color:var(--accent);}
.pack-block-old .pack-block-header{color:var(--muted);}
.pack-block-sub{font-size:11px;color:var(--muted);margin-bottom:8px;}
.pack-lesson{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.pack-lesson:last-child{border-bottom:none;}
.pack-lesson-date{color:var(--muted);min-width:80px;flex-shrink:0;}
.pack-lesson-info{flex:1;}
/* Student card expand */
.student-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
.student-card-header{padding:1rem 1.25rem;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;}
.student-card-header:hover{background:rgba(255,255,255,0.02);}
.student-card-body{display:none;padding:0 1.25rem 1.25rem;border-top:1px solid var(--border);}
.student-card-body.open{display:block;}
.chevron{color:var(--muted);font-size:12px;transition:transform 0.2s;}
.chevron.open{transform:rotate(180deg);}
/* Usage stats */
.usage-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0;}
.usage-stat{background:var(--surface);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;border:1px solid var(--border);}
.usage-stat-num{font-size:18px;font-weight:500;}
.usage-stat-label{font-size:10px;color:var(--muted);margin-top:2px;}
/* Booking */
.booking-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.booking-item:last-child{border-bottom:none;}
.booking-date{color:var(--muted);min-width:85px;font-size:12px;flex-shrink:0;}
.booking-info{flex:1;}
.booking-actions{display:flex;gap:6px;flex-shrink:0;}
/* Sub-tabs */
.sub-tabs{display:flex;gap:4px;margin-bottom:1rem;}
.sub-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;transition:all 0.15s;}
.sub-tab.active{background:var(--surface2);color:var(--text);border-color:var(--border2);}
@media(max-width:520px){.form-row{grid-template-columns:1fr;}.form-row.triple{grid-template-columns:1fr 1fr;}.stat-row{grid-template-columns:1fr 1fr;}.usage-stats{grid-template-columns:1fr 1fr 1fr;}}
</style>
</head>
<body>

<!-- LANDING -->
<div id="screen-landing" class="screen">
  <div class="logo-mark">🪞</div>
  <div class="logo-title">Mirror's Echo</div>
  <div class="logo-sub">PERFORMANCE STUDIO</div>
  <div class="landing-btns">
    <button class="btn-primary" onclick="goTo('screen-login')">老師登入</button>
    <button class="btn-secondary" onclick="goTo('screen-student')">學生查詢課卡</button>
  </div>
  <div style="margin-top:1.5rem"><button class="btn-lang" onclick="toggleLang()">EN / 中</button></div>
</div>

<!-- LOGIN -->
<div id="screen-login" class="screen">
  <div class="login-box">
    <div class="login-title">老師登入</div>
    <div class="login-sub">請輸入管理員密碼</div>
    <div style="margin-bottom:12px"><label>密碼</label><input type="password" id="login-pw" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <button class="btn-primary" style="width:100%" onclick="doLogin()">登入</button>
    <div style="margin-top:1rem;text-align:center"><button class="btn-logout" onclick="goTo('screen-landing')">← 返回</button></div>
    <div id="login-err" style="color:var(--danger);font-size:13px;margin-top:10px;text-align:center;display:none">密碼錯誤</div>
  </div>
</div>

<!-- TEACHER -->
<div id="screen-teacher" class="screen">
  <div class="app-header">
    <div class="header-logo">M·E</div>
    <div class="header-right">
      <button class="btn-lang" onclick="toggleLang()">EN/中</button>
      <span class="tag-role">老師</span>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>
  </div>
  <div class="main-wrap">
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('tab-overview',this)">總覽</button>
      <button class="nav-tab" onclick="switchTab('tab-attendance',this)">點名</button>
      <button class="nav-tab" onclick="switchTab('tab-bookings',this)">預約</button>
      <button class="nav-tab" onclick="switchTab('tab-students',this)">學生</button>
      <button class="nav-tab" onclick="switchTab('tab-venue',this)">場地</button>
      <button class="nav-tab" onclick="switchTab('tab-history',this)">紀錄</button>
      <button class="nav-tab" onclick="switchTab('tab-settings',this)">設定</button>
    </div>

    <!-- OVERVIEW -->
    <div id="tab-overview" class="section active">
      <div class="stat-row" id="overview-stats"></div>
      <div class="card">
        <div class="card-title">學生課卡狀態</div>
        <div class="table-wrap"><table id="overview-table">
          <thead><tr><th>學生</th><th>課程包</th><th>已使用</th><th>已預約</th><th>剩餘可用</th><th>有效期</th><th>狀態</th></tr></thead>
          <tbody></tbody>
        </table></div>
      </div>
    </div>

    <!-- ATTENDANCE -->
    <div id="tab-attendance" class="section">
      <div class="card">
        <div class="card-title">今日點名</div>
        <div class="form-row triple">
          <div><label>日期</label><input type="date" id="att-date" /></div>
          <div><label>老師</label><select id="att-teacher"></select></div>
          <div><label>課程類型</label><select id="att-type"></select></div>
        </div>
        <div class="form-row">
          <div><label>曲目名稱</label><input type="text" id="att-song" placeholder="例：SEVENTEEN - Super" /></div>
          <div>
            <label>上課時間</label>
            <select id="att-time-select" onchange="handleTimeSelect()"></select>
            <input type="text" id="att-time-custom" placeholder="輸入時間" style="display:none;margin-top:6px" />
          </div>
        </div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:1rem">點擊學生卡片切換出席／缺席狀態</div>
        <div class="att-grid" id="att-grid"></div>
        <div class="form-actions" style="margin-top:1.5rem">
          <button class="btn-sm btn-accent" onclick="saveAttendance()">儲存出席紀錄</button>
        </div>
      </div>
    </div>

    <!-- BOOKINGS -->
    <div id="tab-bookings" class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div style="font-size:18px;font-weight:500">預約管理</div>
        <button class="btn-sm btn-accent" onclick="openBookingModal()">+ 新增預約</button>
      </div>
      <div class="card">
        <div class="form-row single" style="margin-bottom:1rem">
          <div><label>篩選學生</label><select id="booking-filter-student"><option value="">全部學生</option></select></div>
        </div>
        <div id="booking-list"></div>
      </div>
    </div>

    <!-- STUDENTS -->
    <div id="tab-students" class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div style="font-size:18px;font-weight:500">學生管理</div>
        <button class="btn-sm btn-accent" onclick="openStudentModal()">+ 新增學生</button>
      </div>
      <div id="student-list"></div>
    </div>

    <!-- VENUE -->
    <div id="tab-venue" class="section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div style="font-size:18px;font-weight:500">場地租借記錄</div>
        <button class="btn-sm btn-accent" onclick="openVenueModal()">+ 新增租借</button>
      </div>
      <div class="card">
        <div class="table-wrap"><table>
          <thead><tr><th>日期</th><th>租借人</th><th>時段</th><th>時數</th><th>金額</th><th>備註</th><th></th></tr></thead>
          <tbody id="venue-tbody"></tbody>
        </table></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="tab-history" class="section">
      <div class="card">
        <div class="card-title">上課紀錄 <span style="font-size:11px;color:var(--muted);font-weight:300">（點標籤可編輯）</span></div>
        <div class="form-row">
          <div><label>篩選學生</label><select id="hist-filter-student"><option value="">全部學生</option></select></div>
          <div><label>篩選月份</label><input type="month" id="hist-filter-month" /></div>
        </div>
        <div id="history-list"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="tab-settings" class="section">
      <div class="card">
        <div class="card-title">老師名單</div>
        <div id="teacher-tag-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem"></div>
        <div style="display:flex;gap:8px">
          <input type="text" id="new-teacher-input" placeholder="新增老師名稱" style="flex:1" />
          <button class="btn-sm btn-accent" onclick="addTeacher()">新增</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">課程類型</div>
        <div id="classtype-tag-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem"></div>
        <div style="display:flex;gap:8px">
          <input type="text" id="new-classtype-input" placeholder="新增課程類型" style="flex:1" />
          <button class="btn-sm btn-accent" onclick="addClassType()">新增</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">常用時段</div>
        <div id="timeslot-tag-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem"></div>
        <div style="display:flex;gap:8px">
          <input type="text" id="new-timeslot-input" placeholder="例：19:00-20:00" style="flex:1" />
          <button class="btn-sm btn-accent" onclick="addTimeSlot()">新增</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">課程包設定</div>
        <div id="packtype-list" style="margin-bottom:1rem"></div>
        <button class="btn-sm btn-accent" onclick="openPackTypeModal()">+ 新增課程包</button>
      </div>

<script>
// ══ LANG ══
let lang='zh';
const TR={
zh:{present:'出席',absent:'缺席',noRecords:'尚無上課紀錄',noBookings:'尚無預約',myCard:'我的課卡',remaining:'剩餘可用',renewReminder:'課卡即將用完，請聯繫老師續卡',thisMonth:'本月統計',noPack:'無課卡',exhausted:'堂數用盡',expired:'已過期',expiringSoon:'即將到期',normal:'正常',sharedWith:'與 {0} 共用課卡',used:'已使用',booked:'已預約',avail:'剩餘可用',currentPack:'目前課卡',historyPacks:'歷史課卡',period:'期限',sessions:'堂數',attended:'已上',upcomingBookings:'即將上課',pastRecords:'上課紀錄'},
en:{present:'Present',absent:'Absent',noRecords:'No records',noBookings:'No bookings',myCard:'My Card',remaining:'Available',renewReminder:'Card running low — contact your teacher',thisMonth:'This Month',noPack:'No Card',exhausted:'Used Up',expired:'Expired',expiringSoon:'Expiring',normal:'Active',sharedWith:'Shared with {0}',used:'Used',booked:'Booked',avail:'Available',currentPack:'Current Card',historyPacks:'Past Cards',period:'Period',sessions:'Sessions',attended:'Attended',upcomingBookings:'Upcoming Classes',pastRecords:'Class Records'}
};
function T(k,a){let s=(TR[lang][k]||TR.zh[k]||k);if(a)s=s.replace('{0}',a);return s;}
function toggleLang(){lang=lang==='zh'?'en':'zh';flash(lang==='en'?'Switched to English':'已切換為中文');renderAll();if(document.getElementById('screen-student').classList.contains('active')){const code=document.getElementById('query-code').value.trim().toUpperCase();if(code&&document.getElementById('student-result').innerHTML)renderStudentResult(code,document.getElementById('query-err'),document.getElementById('student-result'),document.getElementById('cache-note'),document.getElementById('reload-wrap'),false);}}

// ══ DATA ══
const API='https://script.google.com/macros/s/AKfycbwLU_VG5Pfo5lpaj03ZEUSV9DYQIJA7EhYdw2s9Rst3MvfSKIUaIWbuGbApzMcweT4/exec';
const CACHE_KEY='me_cache_v5';const CACHE_TTL=5*60*1000;
let mem={};

const DEFAULT_PACK_TYPES=[
  {name:'單堂',sessions:1,price:'500元/堂'},
  {name:'四堂課卡',sessions:4,price:'1800元（期限一個月）'},
  {name:'十堂課卡',sessions:10,price:'3750元（期限兩個月，可與1位朋友共用）'},
  {name:'二十堂課卡',sessions:20,price:'6000元（期限兩個月，可與2位朋友共用）'},
  {name:'作品專攻一期五堂',sessions:5,price:'2500元'},
];
const DEFAULT_TIME_SLOTS=['19:00-20:00','19:00-20:15','20:30-21:45','20:30-22:00','13:30-14:45','15:30-16:45','14:00-15:30'];

function saveLocalCache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify({data:mem,ts:Date.now()}));}catch(e){}}
function loadLocalCache(){try{const raw=localStorage.getItem(CACHE_KEY);if(!raw)return false;const p=JSON.parse(raw);if(Date.now()-p.ts>CACHE_TTL)return false;mem=p.data;return true;}catch(e){return false;}}
async function apiGet(key,def){try{const r=await fetch(`${API}?action=get${cap(key)}`);const j=await r.json();return j.data?JSON.parse(j.data):def;}catch{return def;}}
async function apiSet(key,val){mem[key]=val;saveLocalCache();try{await fetch(API,{method:'POST',body:JSON.stringify({action:`set${cap(key)}`,value:val})});}catch{}}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function getStudents(){return mem['students']??[];}
function setStudents(s){mem['students']=s;apiSet('students',s);}
function getRecords(){return mem['records']??[];}
function setRecords(r){mem['records']=r;apiSet('records',r);}
function getTeachers(){return mem['teachers']??['雅淳老師','婉甄老師','華華老師','Joan老師'];}
function setTeachers(t){mem['teachers']=t;apiSet('teachers',t);}
function getClassTypes(){return mem['classTypes']??['常態課','作品專攻','MV副歌班'];}
function setClassTypes(c){mem['classTypes']=c;apiSet('classTypes',c);}
function getTimeSlots(){return mem['timeSlots']??DEFAULT_TIME_SLOTS;}
function setTimeSlots(t){mem['timeSlots']=t;apiSet('timeSlots',t);}
function getPackTypes(){return mem['packTypes']??DEFAULT_PACK_TYPES;}
function setPackTypes(p){mem['packTypes']=p;apiSet('packTypes',p);}
function getVenues(){return mem['venues']??[];}
function setVenues(v){mem['venues']=v;apiSet('venues',v);}
function getBookings(){return mem['bookings']??[];}
function setBookings(b){mem['bookings']=b;apiSet('bookings',b);}
function getPw(){return mem['pw']??'me2024';}

async function loadAllData(){
  showLoading(true);
  try{
    mem['students']=await apiGet('students',[]);
    mem['records']=await apiGet('records',[]);
    mem['teachers']=await apiGet('teachers',['雅淳老師','婉甄老師','華華老師','Joan老師']);
    mem['classTypes']=await apiGet('classTypes',['常態課','作品專攻','MV副歌班']);
    mem['timeSlots']=await apiGet('timeSlots',DEFAULT_TIME_SLOTS);
    mem['packTypes']=await apiGet('packTypes',DEFAULT_PACK_TYPES);
    mem['venues']=await apiGet('venues',[]);
    mem['bookings']=await apiGet('bookings',[]);
    const cfg=await apiGet('config',{pw:'me2024'});
    mem['pw']=cfg?cfg.pw:'me2024';
    saveLocalCache();
  }finally{showLoading(false);}
}

function showLoading(on){
  let el=document.getElementById('lo');
  if(!el){el=document.createElement('div');el.id='lo';el.style.cssText='position:fixed;inset:0;background:rgba(10,10,15,0.88);z-index:9998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;';el.innerHTML='<div style="width:32px;height:32px;border:2px solid rgba(179,136,255,0.3);border-top-color:#b388ff;border-radius:50%;animation:spin 0.8s linear infinite"></div><div style="color:#8a85a0;font-size:13px">載入中...</div>';const st=document.createElement('style');st.textContent='@keyframes spin{to{transform:rotate(360deg)}}';document.head.appendChild(st);document.body.appendChild(el);}
  el.style.display=on?'flex':'none';
}

// ══ CARD INFO ══
function getCardInfo(studentId){
  const students=getStudents();
  const s=students.find(x=>x.id===studentId);
  if(!s)return null;
  if(s.pack==='共用'&&s.hostCode){const host=students.find(x=>x.code===s.hostCode);if(host)return{student:s,cardHolder:host,isShared:true};}
  const host=students.find(h=>h.sharedMembers&&h.sharedMembers.includes(s.code)&&h.pack!=='共用');
  if(host)return{student:s,cardHolder:host,isShared:true};
  return{student:s,cardHolder:s,isShared:false};
}

// ══ USAGE STATS ══
function getUsageStats(studentId){
  const ci=getCardInfo(studentId);
  if(!ci)return{used:0,booked:0,avail:0,total:0,remaining:0,cardStudentIds:[studentId]};
  const ch=ci.cardHolder;
  const today=new Date().toISOString().slice(0,10);
  const students=getStudents();
  // Build all IDs on this card: host + all shared members
  const cardStudentIds=[ch.id];
  (ch.sharedMembers||[]).forEach(code=>{const sm=students.find(x=>x.code===code);if(sm)cardStudentIds.push(sm.id);});
  // Also ensure the querying student is included even if sharedMembers not set correctly
  if(!cardStudentIds.includes(studentId))cardStudentIds.push(studentId);
  const used=getRecords().filter(r=>cardStudentIds.includes(r.studentId)&&r.status==='present').length;
  const booked=getBookings().filter(b=>cardStudentIds.includes(b.studentId)&&b.date>=today).length;
  const remaining=ch.remaining??0;
  const avail=Math.max(0,remaining-booked);
  return{used,booked,avail,total:ch.total??0,remaining,cardStudentIds};
}

// ══ NAV ══
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-teacher')renderAll();
  if(id==='screen-student'){document.getElementById('query-code').value='';document.getElementById('student-result').innerHTML='';document.getElementById('query-err').style.display='none';document.getElementById('cache-note').style.display='none';document.getElementById('reload-wrap').style.display='none';}
}
function logout(){goTo('screen-landing');}
function switchTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
  if(id==='tab-attendance')renderAttendance();
  if(id==='tab-students')renderStudents();
  if(id==='tab-history')renderHistory();
  if(id==='tab-overview')renderOverview();
  if(id==='tab-settings')renderSettings();
  if(id==='tab-venue')renderVenue();
  if(id==='tab-bookings')renderBookings();
}

async function doLogin(){
  const pw=document.getElementById('login-pw').value;
  await loadAllData();
  if(pw===getPw()){document.getElementById('login-err').style.display='none';document.getElementById('login-pw').value='';goTo('screen-teacher');}
  else{document.getElementById('login-err').style.display='block';}
}

// ══ OVERVIEW ══
function renderOverview(){
  const students=getStudents(),records=getRecords(),today=new Date();
  const active=students.filter(s=>{const ci=getCardInfo(s.id);return ci&&!ci.isShared&&ci.cardHolder.pack&&ci.cardHolder.remaining>0;}).length;
  const expiring=students.filter(s=>{const ci=getCardInfo(s.id);if(!ci||!ci.cardHolder.expire)return false;const d=new Date(ci.cardHolder.expire);return(d-today)/86400000<=14&&(d-today)>=0;}).length;
  const thisMonth=today.toISOString().slice(0,7);
  const upcomingBookings=getBookings().filter(b=>b.date>=today.toISOString().slice(0,10)).length;
  document.getElementById('overview-stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">學生人數</div><div class="stat-value">${students.length}</div></div>
    <div class="stat-card"><div class="stat-label">有效課卡</div><div class="stat-value" style="color:var(--success)">${active}</div></div>
    <div class="stat-card"><div class="stat-label">即將到期（14天）</div><div class="stat-value" style="color:var(--warning)">${expiring}</div></div>
    <div class="stat-card"><div class="stat-label">本月出席</div><div class="stat-value">${records.filter(r=>r.date&&r.date.startsWith(thisMonth)&&r.status==='present').length}</div></div>
    <div class="stat-card"><div class="stat-label">待上預約</div><div class="stat-value" style="color:#64b5f6">${upcomingBookings}</div></div>`;
  const tbody=document.querySelector('#overview-table tbody');
  if(!students.length){tbody.innerHTML=`<tr><td colspan="7" class="empty">尚無學生資料</td></tr>`;return;}
  tbody.innerHTML=students.map(s=>{
    const ci=getCardInfo(s.id);const ch=ci?ci.cardHolder:s;
    const stats=getUsageStats(s.id);
    const pct=ch.total?Math.round((stats.avail/ch.total)*100):0;
    const barClass=pct>40?'green':pct>15?'yellow':'red';
    const packLabel=ci&&ci.isShared?T('sharedWith',ch.name):(ch.pack||'—');
    let status='';
    if(!ch.pack)status=`<span class="badge badge-gray">${T('noPack')}</span>`;
    else if(ch.remaining<=0)status=`<span class="badge badge-red">${T('exhausted')}</span>`;
    else if(ch.expire&&new Date(ch.expire)<today)status=`<span class="badge badge-red">${T('expired')}</span>`;
    else if(ch.expire&&(new Date(ch.expire)-today)/86400000<=14)status=`<span class="badge badge-gold">${T('expiringSoon')}</span>`;
    else status=`<span class="badge badge-green">${T('normal')}</span>`;
    return `<tr><td><strong>${s.name}</strong><br><span style="font-size:11px;color:var(--muted)">${s.code}</span></td>
      <td style="font-size:12px">${packLabel}</td>
      <td style="font-size:13px">${stats.used}</td>
      <td style="font-size:13px">${stats.booked}</td>
      <td><span style="font-size:15px;font-weight:500;color:${stats.avail<=2?'var(--danger)':'var(--text)'}">${stats.avail}</span><span style="color:var(--muted);font-size:12px"> / ${ch.total||'—'}</span>
      ${ch.total?`<div class="progress-wrap"><div class="progress-bar ${barClass}" style="width:${Math.max(pct,0)}%"></div></div>`:''}</td>
      <td style="font-size:12px;color:var(--muted)">${ch.expire||'—'}</td><td>${status}</td></tr>`;
  }).join('');
}

// ══ TIME SELECT HELPERS ══
function buildTimeOptions(selectId,customId){
  const sel=document.getElementById(selectId);
  const slots=getTimeSlots();
  sel.innerHTML=slots.map(t=>`<option value="${t}">${t}</option>`).join('')+'<option value="custom">自訂...</option>';

}
function getTimeVal(selectId,customId){const v=document.getElementById(selectId).value;return v==='custom'?document.getElementById(customId).value:v;}
function handleTimeSelect(){document.getElementById('att-time-custom').style.display=document.getElementById('att-time-select').value==='custom'?'block':'none';}
function handleBkTimeSelect(){document.getElementById('bk-time-custom').style.display=document.getElementById('bk-time-select').value==='custom'?'block':'none';}

// ══ ATTENDANCE ══
let attState={};
function renderAttendance(){
  const students=getStudents();
  if(!document.getElementById('att-date').value)document.getElementById('att-date').value=new Date().toISOString().slice(0,10);
  attState={};students.forEach(s=>{attState[s.id]='none';});
  document.getElementById('att-teacher').innerHTML=getTeachers().map(t=>`<option value="${t}">${t}</option>`).join('');
  document.getElementById('att-type').innerHTML=getClassTypes().map(c=>`<option value="${c}">${c}</option>`).join('');
  buildTimeOptions('att-time-select','att-time-custom');
  if(!students.length){document.getElementById('att-grid').innerHTML='<div class="empty">尚無學生</div>';return;}
  renderAttGrid(students);
}
function renderAttGrid(students){
  document.getElementById('att-grid').innerHTML=students.map(s=>{
    const st=attState[s.id];
    const cardClass=st==='present'?'present':st==='absent'?'absent':'';
    const label=st==='present'?'✓ 出席':st==='absent'?'✗ 缺席':'—';
    const stats=getUsageStats(s.id);
    return `<div class="att-card ${cardClass}" onclick="toggleAtt('${s.id}')">
      <div class="att-name">${s.name}</div>
      <div class="att-sub">可用 ${stats.avail} 堂</div>
      <div style="margin-top:6px;font-size:12px;color:${st==='present'?'var(--success)':st==='absent'?'var(--danger)':'var(--muted)'}">${label}</div>
    </div>`;
  }).join('');
}
function toggleAtt(id){const cur=attState[id];attState[id]=cur==='none'?'present':cur==='present'?'absent':'none';renderAttGrid(getStudents());}
function saveAttendance(){
  const date=document.getElementById('att-date').value;
  if(!date){flash('請選擇日期');return;}
  const song=document.getElementById('att-song').value.trim();
  const teacher=document.getElementById('att-teacher').value;
  const type=document.getElementById('att-type').value;
  const time=getTimeVal('att-time-select','att-time-custom');
  const students=getStudents(),records=getRecords();let count=0;
  students.forEach(s=>{
    const st=attState[s.id];if(st==='none')return;
    const ci=getCardInfo(s.id);
    const primaryId=ci?ci.cardHolder.id:s.id;
    records.push({id:Date.now().toString()+Math.random().toString(36).slice(2),studentId:s.id,primaryCardId:primaryId,date,dance:song,type,teacher,time,status:st});
    count++;
    if(st==='present'){const idx=students.findIndex(x=>x.id===primaryId);if(idx!==-1&&students[idx].remaining>0)students[idx].remaining=Math.max(0,(students[idx].remaining||0)-1);}
  });
  setStudents(students);setRecords(records);
  flash(`已儲存 ${count} 筆紀錄`);renderOverview();renderAttGrid(students);
}

// ══ BOOKINGS ══
let editingBookingId=null;
function renderBookings(){
  const students=getStudents(),bookings=getBookings();

  const sel=document.getElementById('booking-filter-student');
  const cur=sel.value;
  sel.innerHTML='<option value="">全部學生</option>'+students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  sel.value=cur;
  const filterStudent=sel.value;
  const today=new Date().toISOString().slice(0,10);
  let filtered=[...bookings];
  if(filterStudent)filtered=filtered.filter(b=>b.studentId===filterStudent);
  filtered.sort((a,b)=>a.date.localeCompare(b.date));

  const past=filtered.filter(b=>b.date<today);

    return`<div style="font-size:12px;color:var(--muted);letter-spacing:0.06em;margin:12px 0 6px">${label}</div>`+
    list.map(b=>{
      const s=students.find(x=>x.id===b.studentId);
      const stats=b.studentId?getUsageStats(b.studentId):{avail:0};
      return`<div class="booking-item">
        <div class="booking-date">${b.date}<br><span style="font-size:11px">${b.time||''}</span></div>
        <div class="booking-info">
          <div style="font-weight:500">${s?s.name:'—'}</div>
          <div style="font-size:12px;color:var(--muted)">${b.song||'—'} ${b.teacher?'· '+b.teacher:''}</div>
          ${b.note?`<div style="font-size:11px;color:var(--muted)">${b.note}</div>`:''}
          <div style="font-size:11px;color:var(--muted);margin-top:2px">剩餘可用：${stats.avail} 堂</div>
        </div>
        <div class="booking-actions">
          <button class="btn-sm btn-success" style="padding:5px 10px;font-size:12px" onclick="confirmBooking('${b.id}')">✓ 出席</button>
          <button class="btn-sm btn-ghost" style="padding:5px 10px;font-size:12px" onclick="openBookingModal('${b.id}')">編輯</button>
        </div>
      </div>`;
    }).join('');
  };
  container.innerHTML=renderGroup(upcoming,'即將上課')+renderGroup(past,'已過期預約');
}
document.getElementById('booking-filter-student').addEventListener('change',renderBookings);

function openBookingModal(id){
  editingBookingId=id||null;
  const students=getStudents();
  document.getElementById('bk-student').innerHTML=students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  document.getElementById('bk-teacher').innerHTML=getTeachers().map(t=>`<option value="${t}">${t}</option>`).join('');
  document.getElementById('bk-type').innerHTML=getClassTypes().map(c=>`<option value="${c}">${c}</option>`).join('');
  buildTimeOptions('bk-time-select','bk-time-custom');
  document.getElementById('modal-booking-title').textContent=id?'編輯預約':'新增預約';
  document.getElementById('btn-delete-booking').style.display=id?'inline-flex':'none';
  if(id){
    const b=getBookings().find(x=>x.id===id);
    document.getElementById('bk-student').value=b.studentId||'';
    document.getElementById('bk-date').value=b.date||'';
    document.getElementById('bk-teacher').value=b.teacher||'';
    document.getElementById('bk-type').value=b.type||'';
    document.getElementById('bk-song').value=b.song||'';
    document.getElementById('bk-note').value=b.note||'';
    // Set time
    const slots=getTimeSlots();
    if(slots.includes(b.time)){document.getElementById('bk-time-select').value=b.time;document.getElementById('bk-time-custom').style.display='none';}
    else if(b.time){document.getElementById('bk-time-select').value='custom';document.getElementById('bk-time-custom').value=b.time;document.getElementById('bk-time-custom').style.display='block';}
  } else {
    document.getElementById('bk-date').value=new Date().toISOString().slice(0,10);
    ['bk-song','bk-note'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('bk-time-custom').style.display='none';
  }
  openModal('modal-booking');
}
function saveBooking(){
  const studentId=document.getElementById('bk-student').value;
  const date=document.getElementById('bk-date').value;
  if(!studentId||!date){flash('學生和日期為必填');return;}
  const bookings=getBookings();
  const entry={id:editingBookingId||Date.now().toString()+Math.random().toString(36).slice(2),studentId,date,teacher:document.getElementById('bk-teacher').value,type:document.getElementById('bk-type').value,song:document.getElementById('bk-song').value.trim(),time:getTimeVal('bk-time-select','bk-time-custom'),note:document.getElementById('bk-note').value.trim()};
  if(editingBookingId){const idx=bookings.findIndex(b=>b.id===editingBookingId);if(idx!==-1)bookings[idx]=entry;}
  else bookings.push(entry);
  setBookings(bookings);closeModal('modal-booking');renderBookings();renderOverview();flash('預約已儲存');
}
function deleteBooking(){
  if(!confirm('確定要刪除此預約？'))return;
  setBookings(getBookings().filter(b=>b.id!==editingBookingId));
  closeModal('modal-booking');renderBookings();renderOverview();flash('預約已刪除');
}
function confirmBooking(id){
  const b=getBookings().find(x=>x.id===id);if(!b)return;
  const students=getStudents(),records=getRecords();
  const s=students.find(x=>x.id===b.studentId);if(!s){flash('找不到學生');return;}
  const ci=getCardInfo(b.studentId);
  const primaryId=ci?ci.cardHolder.id:b.studentId;
  records.push({id:Date.now().toString()+Math.random().toString(36).slice(2),studentId:b.studentId,primaryCardId:primaryId,date:b.date,dance:b.song,type:b.type,teacher:b.teacher,time:b.time,status:'present'});
  const idx=students.findIndex(x=>x.id===primaryId);
  if(idx!==-1&&students[idx].remaining>0)students[idx].remaining=Math.max(0,(students[idx].remaining||0)-1);
  setStudents(students);setRecords(records);
  // Remove booking
  setBookings(getBookings().filter(x=>x.id!==id));
  renderBookings();renderOverview();flash(`${s.name} 出席確認，堂數已扣除`);
}

// ══ PACK HISTORY BLOCKS ══
function buildPackHistoryBlocks(studentId){
  const students=getStudents();
  const s=students.find(x=>x.id===studentId);if(!s)return'';
  const ci=getCardInfo(studentId);const ch=ci?ci.cardHolder:s;
  const stats=getUsageStats(studentId);
  const today=new Date().toISOString().slice(0,10);
  // All records for whole card (all shared members)
  const allCardRecords=getRecords().filter(r=>stats.cardStudentIds.includes(r.studentId)&&r.status==='present');
  allCardRecords.sort((a,b)=>a.date.localeCompare(b.date));
  const currentStart=ch.packStart||'';
  const currentExpire=ch.expire||'';
  const packLabel=ci&&ci.isShared?T('sharedWith',ch.name)+`・${ch.pack||''}`:ch.pack||'課程包';
  const currentRecords=allCardRecords.filter(r=>{
    if(currentStart&&r.date<currentStart)return false;
    if(currentExpire&&r.date>currentExpire)return false;
    return true;
  });
  // Upcoming bookings for whole card
  const upcomingBk=getBookings().filter(b=>stats.cardStudentIds.includes(b.studentId)&&b.date>=today).sort((a,b)=>a.date.localeCompare(b.date));

  const renderLessons=(recs)=>{
    if(!recs.length)return`<div style="color:var(--muted);font-size:12px;padding:6px 0">${T('noRecords')}</div>`;
    return recs.map(r=>{
      const attendee=students.find(x=>x.id===r.studentId);
      const isSelf=r.studentId===studentId;
      const whoLabel=!isSelf&&attendee?`<span style="color:#64b5f6;font-size:10px">（${attendee.name}）</span>`:'';
      return`<div class="pack-lesson">
        <div class="pack-lesson-date">${r.date}</div>
        <div class="pack-lesson-info">${r.dance||'—'}${r.time?` <span style="color:var(--muted)">${r.time}</span>`:''} ${whoLabel}<br><span style="color:var(--muted);font-size:11px">${r.teacher||''}</span></div>
      </div>`;
    }).join('');
  };

  const renderBookings=(bks)=>{
    if(!bks.length)return`<div style="color:var(--muted);font-size:12px;padding:6px 0">${T('noBookings')}</div>`;
    return bks.map(b=>{
      const attendee=students.find(x=>x.id===b.studentId);
      const isSelf=b.studentId===studentId;
      const whoLabel=!isSelf&&attendee?`<span style="color:#64b5f6;font-size:10px">（${attendee.name}）</span>`:'';
      return`<div class="pack-lesson">
        <div class="pack-lesson-date">${b.date}<br><span style="font-size:10px">${b.time||''}</span></div>
        <div class="pack-lesson-info">${b.song||'—'} ${whoLabel}<br><span style="color:var(--muted);font-size:11px">${b.teacher||''}</span></div>
        <span class="badge badge-blue" style="flex-shrink:0">預約中</span>
      </div>`;
    }).join('');
  };
  
  let html=`<div class="pack-block">
    <div class="pack-block-header">${T('currentPack')}：${packLabel}</div>
    <div class="pack-block-sub">${T('period')}：${currentStart||'—'} ～ ${currentExpire||'—'}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
      <div style="background:var(--surface);border-radius:var(--radius-sm);padding:6px 8px;text-align:center;border:1px solid var(--border)"><div style="font-size:16px;font-weight:500">${stats.used}</div><div style="font-size:10px;color:var(--muted)">${T('used')}</div></div>
      <div style="background:var(--surface);border-radius:var(--radius-sm);padding:6px 8px;text-align:center;border:1px solid var(--border)"><div style="font-size:16px;font-weight:500;color:#64b5f6">${stats.booked}</div><div style="font-size:10px;color:var(--muted)">${T('booked')}</div></div>
      <div style="background:var(--surface);border-radius:var(--radius-sm);padding:6px 8px;text-align:center;border:1px solid var(--border)"><div style="font-size:16px;font-weight:500;color:var(--success)">${stats.avail}</div><div style="font-size:10px;color:var(--muted)">${T('avail')}</div></div>
    </div>
    ${upcomingBk.length?`<div style="font-size:11px;color:var(--muted);margin-bottom:4px">即將上課</div>${renderBookings(upcomingBk)}<div style="font-size:11px;color:var(--muted);margin:8px 0 4px">上課紀錄</div>`:''}
    ${renderLessons(currentRecords)}
  </div>`;
  const packHistory=s.packHistory||[];
  if(packHistory.length){
    html+=`<div style="font-size:12px;color:var(--muted);margin:12px 0 6px">${T('historyPacks')}</div>`;
    [...packHistory].reverse().forEach((ph,ri)=>{
      const i=packHistory.length-1-ri;
      const phRecords=allRecords.filter(r=>{
        if(ph.packStart&&r.date<ph.packStart)return false;
        if(ph.expire&&r.date>ph.expire)return false;
        return true;
      });
      html+=`<div class="pack-block pack-block-old">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="pack-block-header">${ph.pack||'課程包'}</div>
            <div class="pack-block-sub">${T('period')}：${ph.packStart||'—'} ～ ${ph.expire||'—'}　${T('attended')} ${phRecords.length} / ${ph.total||'—'} ${T('sessions')}</div>
          </div>
          <button class="btn-sm btn-ghost" style="padding:3px 8px;font-size:11px;flex-shrink:0" onclick="openPackHistoryModal('${studentId}',${i})">編輯</button>
        </div>
        ${renderLessons(phRecords)}
      </div>`;
    });
  }
  return html;
}

// ══ STUDENTS ══
let editingStudentId=null;
function renderStudents(){
  const students=getStudents(),container=document.getElementById('student-list');
  if(!students.length){container.innerHTML='<div class="empty">尚無學生資料</div>';return;}
  container.innerHTML=students.map(s=>{
    const ci=getCardInfo(s.id);const ch=ci?ci.cardHolder:s;
    const stats=getUsageStats(s.id);
    const pct=ch.total?Math.round((stats.avail/ch.total)*100):0;
    const barClass=pct>40?'green':pct>15?'yellow':'red';
    const today=new Date();
    const isExpiring=ch.expire&&(new Date(ch.expire)-today)/86400000<=7&&(new Date(ch.expire)-today)>=0;
    const isLow=stats.avail<=2&&stats.avail>=0&&ch.pack;
    const alerts=(isExpiring?'<div class="alert-banner warning" style="margin-top:8px;padding:8px 12px">⚠ 課卡7天內到期</div>':'')+(isLow?`<div class="alert-banner" style="margin-top:8px;padding:8px 12px">⚠ 剩餘可用僅 ${stats.avail} 堂</div>`:'');
    const packDisplay=ci&&ci.isShared?`<span style="color:var(--accent)">${T('sharedWith',ch.name)}</span>・${ch.pack||''}`:ch.pack||'尚無課程包';
    return `<div class="student-card">
      <div class="student-card-header" onclick="toggleStudentCard('sc-${s.id}')">
        <div style="flex:1">
          <div style="font-size:16px;font-weight:500">${s.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">查詢碼：<strong style="color:var(--accent)">${s.code}</strong>${s.contact?' ｜ '+s.contact:''}</div>
          <div style="font-size:13px;margin-top:4px">${packDisplay}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;max-width:260px">
            <div style="text-align:center;font-size:12px"><div style="font-weight:500">${stats.used}</div><div style="color:var(--muted);font-size:10px">${T('used')}</div></div>
            <div style="text-align:center;font-size:12px"><div style="font-weight:500;color:#64b5f6">${stats.booked}</div><div style="color:var(--muted);font-size:10px">${T('booked')}</div></div>
            <div style="text-align:center;font-size:12px"><div style="font-weight:500;color:${stats.avail<=2?'var(--danger)':'var(--success)'}">${stats.avail}</div><div style="color:var(--muted);font-size:10px">${T('avail')}</div></div>
          </div>
          ${ch.total?`<div class="progress-wrap" style="margin-top:6px;max-width:200px"><div class="progress-bar ${barClass}" style="width:${Math.max(pct,0)}%"></div></div>`:''}
          ${alerts}
        </div>
        <div style="display:flex;align-items:flex-start;gap:6px;margin-left:8px;flex-shrink:0">
          <button class="btn-sm btn-ghost" style="padding:5px 8px;font-size:11px" onclick="event.stopPropagation();openPackModal('${s.id}')">換課程包</button>
          <button class="btn-sm btn-ghost" style="padding:5px 8px;font-size:11px" onclick="event.stopPropagation();openStudentModal('${s.id}')">編輯</button>
          <span class="chevron" id="chv-${s.id}">▼</span>
        </div>
      </div>
      <div class="student-card-body" id="sc-${s.id}">
        <div style="padding-top:1rem">${buildPackHistoryBlocks(s.id)}</div>
      </div>
    </div>`;
  }).join('');
}

function saveRecord(){
  const id=document.getElementById('rec-edit-id').value;
  const records=getRecords();const idx=records.findIndex(r=>r.id===id);if(idx===-1)return;
  const oldStatus=records[idx].status;const newStatus=document.getElementById('rec-status').value;
  records[idx]={...records[idx],date:document.getElementById('rec-date').value,status:newStatus,dance:document.getElementById('rec-dance').value.trim(),teacher:document.getElementById('rec-teacher').value.trim(),time:document.getElementById('rec-time').value.trim()};
  if(oldStatus!==newStatus){
    const students=getStudents();const primaryId=records[idx].primaryCardId||records[idx].studentId;
    const sidx=students.findIndex(s=>s.id===primaryId);
    if(sidx!==-1){
      if(oldStatus==='present'&&newStatus==='absent')students[sidx].remaining=Math.min((students[sidx].remaining||0)+1,students[sidx].total||999);
      if(oldStatus==='absent'&&newStatus==='present')students[sidx].remaining=Math.max((students[sidx].remaining||0)-1,0);
      setStudents(students);
    }
  }
  setRecords(records);closeModal('modal-record');renderHistory();renderOverview();flash('紀錄已更新');
}

}

function renderStudentResult(code,err,result,cacheNote,reloadWrap,hadCache){
  const students=getStudents();
  const s=students.find(x=>x.code===code);
  const hostStudent=s?null:students.find(h=>h.sharedMembers&&h.sharedMembers.includes(code));
  if(!s&&!hostStudent){err.style.display='block';result.innerHTML='';cacheNote.style.display='none';reloadWrap.style.display='none';return;}
  err.style.display='none';
  const ci=s?getCardInfo(s.id):{student:null,cardHolder:hostStudent,isShared:true};
  const ch=ci.cardHolder;
  const displayName=s?s.name:code;
  const targetId=s?s.id:(hostStudent?hostStudent.id:null);
  const stats=targetId?getUsageStats(targetId):{used:0,booked:0,avail:0,total:0};
  const today=new Date();const todayStr=today.toISOString().slice(0,10);
  const pct=ch.total?Math.round((stats.avail/ch.total)*100):0;
  const barClass=pct>40?'green':pct>15?'yellow':'red';
  const daysLeft=ch.expire?Math.ceil((new Date(ch.expire)-today)/86400000):null;
  const isExpiring=daysLeft!==null&&daysLeft<=7&&daysLeft>=0;
  const isLow=stats.avail<=2&&stats.avail>=0&&ch.pack;
  const sharedNote=ci.isShared&&hostStudent?`<div style="font-size:12px;color:var(--muted);margin-top:4px">${T('sharedWith',hostStudent.name)}</div>`:'';
  const renewAlert=(isExpiring||isLow)?`<div class="alert-banner" style="margin-bottom:1rem">⚠ ${T('renewReminder')}<br><a href="https://lin.ee/707emoda" style="color:var(--danger)">LINE: @707emoda</a></div>`:'';
  const packLabel=ci.isShared?`${ch.pack||''} （${T('sharedWith',ch.name)}）`:ch.pack||'尚無課程包';
  // Upcoming bookings for whole card (all members)
  const allCardIds=stats.cardStudentIds||[targetId];
  const upcomingBk=getBookings().filter(b=>allCardIds.includes(b.studentId)&&b.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date));
  const bkRows=upcomingBk.length?upcomingBk.map(b=>{
    const attendee=students.find(x=>x.id===b.studentId);
    const isSelf=b.studentId===targetId;
    const whoLabel=!isSelf&&attendee?`<span style="font-size:11px;color:#64b5f6">（${attendee.name}）</span>`:'';
    return`<div class="booking-item">
      <div class="booking-date">${b.date}<br><span style="font-size:11px">${b.time||''}</span></div>
      <div class="booking-info"><div style="font-weight:500">${b.song||'—'} ${whoLabel}</div><div style="font-size:12px;color:var(--muted)">${b.teacher||''}</div></div>
      <span class="badge badge-blue">預約中</span>
    </div>`;
  }).join(''):`<div class="empty" style="padding:1rem 0">${T('noBookings')}</div>`;
  const packBlocks=targetId?buildPackHistoryBlocks(targetId):'';
  result.innerHTML=`
    <div class="student-hero">
      <div class="student-hero-name">${displayName}</div>
      <div class="student-hero-sub">${code}${sharedNote}</div>
    </div>
    ${renewAlert}
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">${T('myCard')}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
        <div>
          <div style="font-size:15px;font-weight:500">${packLabel}</div>
          ${ch.packStart||ch.expire?`<div style="font-size:13px;color:${isExpiring?'var(--warning)':'var(--muted)'}">期限：${ch.packStart||'—'} ～ ${ch.expire||'—'}${daysLeft!==null?' （剩 '+daysLeft+' 天）':''}</div>`:''}
        </div>
      </div>
      ${ch.total?`<div class="progress-wrap" style="margin-top:10px"><div class="progress-bar ${barClass}" style="width:${Math.max(pct,0)}%"></div></div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px">
        <div class="usage-stat"><div class="usage-stat-num">${stats.used}</div><div class="usage-stat-label">${T('used')}</div></div>
        <div class="usage-stat"><div class="usage-stat-num" style="color:#64b5f6">${stats.booked}</div><div class="usage-stat-label">${T('booked')}</div></div>
        <div class="usage-stat"><div class="usage-stat-num" style="color:${stats.avail<=2?'var(--danger)':'var(--success)'}">${stats.avail}</div><div class="usage-stat-label">${T('avail')}</div></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">${T('upcomingBookings')}</div>
      ${bkRows}
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">${T('pastRecords')}</div>
      ${packBlocks}
    </div>
    <div class="studio-info">
      <div style="font-weight:500;margin-bottom:6px">Mirror's Echo Performance Studio</div>
      <div>📍 台北市中山區長安東路二段42-7號3樓</div>
      <div>💬 LINE: <a href="https://lin.ee/707emoda">@707emoda</a></div>
      <div>📸 IG: <a href="https://www.instagram.com/m.e_performance_studio/">@m.e_performance_studio</a></div>
    </div>`;
  reloadWrap.style.display='block';
  if(hadCache){cacheNote.style.display='block';cacheNote.textContent='顯示快取資料，如需最新資訊請點下方重新載入';}
  else{cacheNote.style.display='none';}
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});});
function flash(msg){const el=document.createElement('div');el.className='flash';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}
function renderAll(){renderOverview();}
goTo('screen-landing');
</script>
</body>
</html>
